# Web server — Hono HTTP API + static file serving (no Graphile Worker).
# Scales horizontally via HPA for exam-period traffic spikes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: uml-assessment
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Never drop below current replica count during deploys — exams can't tolerate downtime
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      # Spread web pods across nodes for redundancy
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: web
                topologyKey: kubernetes.io/hostname
      containers:
        - name: web
          image: ghcr.io/OWNER/uml-assessment:latest  # Replace OWNER with your GitHub org/user
          command: ["node", "dist/server/index.js"]
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          envFrom:
            - secretRef:
                name: app-secrets
            - configMapRef:
                name: app-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Readiness: checks DB connectivity — removes pod from Service if DB is unreachable
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          # Liveness: just checks process is alive — avoids killing pods on transient DB blips
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          lifecycle:
            preStop:
              # Allow in-flight requests to drain before SIGTERM — gives Ingress time to deregister pod
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: uml-assessment
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
