# Database migration Job — run BEFORE deploying new web/worker versions.
#
# Drizzle ORM migrations are idempotent (tracking table) — re-running is a no-op.
# The migration script connects with max=1 connection and prepare: false,
# so it works with Supabase's pooled connection (port 6543).
#
# CI/CD pipeline should:
#   1. kubectl delete job db-migrate -n uml-assessment --ignore-not-found
#   2. kubectl apply -f migration-job.yaml
#   3. kubectl wait --for=condition=complete job/db-migrate --timeout=120s
#   4. If success → update web + worker Deployment images
#   5. If failure → abort, old pods keep running on the old schema
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: uml-assessment
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 120
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/OWNER/uml-assessment:latest  # Replace OWNER + tag
          command: ["node", "dist/db/migrate.js"]
          envFrom:
            - secretRef:
                name: app-secrets
