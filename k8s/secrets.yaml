# Application secrets — replace placeholder values before applying.
# For production, consider Sealed Secrets (Bitnami) for git-safe encryption.
#
# IMPORTANT: Do NOT commit this file with real values to version control.
# Use `kubectl create secret` or a sealed-secrets workflow instead.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: uml-assessment
type: Opaque
stringData:
  # Database — Supabase pooled connection string (transaction mode).
  # Find this in Supabase Dashboard → Settings → Database → Connection string → URI (pooler).
  # Use the "Transaction" mode URL (port 6543) — matches our prepare: false / noPreparedStatements: true config.
  DATABASE_URL: "postgresql://postgres.XXXXX:PASSWORD@aws-0-REGION.pooler.supabase.com:6543/postgres"

  # Database — Supabase DIRECT connection (port 5432, supports prepared statements).
  # Used ONLY by the migration Job. Find this in Supabase Dashboard → Settings → Database → Connection string → URI.
  DIRECT_DATABASE_URL: "postgresql://postgres.XXXXX:PASSWORD@aws-0-REGION.supabase.com:5432/postgres"

  # Auth — must be at least 32 characters
  JWT_SECRET: "CHANGE_ME_GENERATE_A_STRONG_RANDOM_SECRET_HERE"
  VITE_SUPABASE_ANON_KEY: "CHANGE_ME"

  # LLM API keys (at least one required for auto-grading)
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""

  # SMTP (optional — email features degrade gracefully without these)
  SMTP_HOST: ""
  SMTP_PORT: ""
  SMTP_USER: ""
  SMTP_PASS: ""
  SMTP_FROM: ""
