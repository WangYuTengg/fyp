# Experiment Configuration
experiment:
  name: "uml-llm-grading-benchmark"
  runs_per_submission: 5  # For consistency measurement
  max_retries: 3
  timeout_seconds: 120

# Models to benchmark (6 models: 2 per provider — 1 flagship + 1 baseline)
models:
  # OpenAI
  - id: "gpt-5.4"
    provider: "openai"
    model_name: "gpt-5.4"
    input_cost_per_1m: 2.50
    output_cost_per_1m: 15.00

  - id: "gpt-5.4-mini"
    provider: "openai"
    model_name: "gpt-5.4-mini"
    input_cost_per_1m: 0.75
    output_cost_per_1m: 4.50

  # Anthropic
  - id: "claude-opus-4-6"
    provider: "anthropic"
    model_name: "claude-opus-4-6"
    input_cost_per_1m: 5.00
    output_cost_per_1m: 25.00

  - id: "claude-sonnet-4-6"
    provider: "anthropic"
    model_name: "claude-sonnet-4-6"
    input_cost_per_1m: 3.00
    output_cost_per_1m: 15.00

  # Google
  - id: "gemini-3.1-pro"
    provider: "google"
    model_name: "gemini-3.1-pro-preview"
    input_cost_per_1m: 2.00
    output_cost_per_1m: 12.00

  - id: "gemini-3-flash"
    provider: "google"
    model_name: "gemini-3-flash-preview"
    input_cost_per_1m: 0.50
    output_cost_per_1m: 3.00

# Rubric definition (10-point scale)
rubric:
  total_points: 10
  criteria:
    - name: "class_correctness"
      max_points: 2
      description: "Are all required classes/entities present and correctly named?"
    - name: "relationship_accuracy"
      max_points: 2
      description: "Are relationships (association, inheritance, composition, etc.) correct?"
    - name: "cardinality"
      max_points: 2
      description: "Are multiplicities/cardinalities correctly specified?"
    - name: "naming_conventions"
      max_points: 2
      description: "Do classes, attributes, and methods follow proper naming conventions?"
    - name: "completeness"
      max_points: 2
      description: "Does the diagram fully address the requirements/specification?"
